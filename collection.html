<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Consultez votre collection complète de vinyles">
    <title>Ma Collection Vinyles - Collection complète</title>
    
    <!-- Polices Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <nav>
            <a href="index.html" class="back-link">
                ← Retour à l'accueil
            </a>
        </nav>
        
        <!-- En-tête -->
        <header>
            <h1>📀 Ma Collection</h1>
        </header>

        <div class="actions-top">
            <button class="export-btn" onclick="exporterCSV()">📥 Exporter CSV</button>
        </div>
        
        <!-- Statistiques -->
        <section class="collection-stats">
            <!-- Les statistiques seront injectées ici par JavaScript -->
        </section>
        
        <!-- Contrôles de tri et filtres -->
        <section class="collection-controls">
            <!-- Les contrôles seront injectés ici par JavaScript -->
        </section>
        
        <!-- Collection complète -->
        <section>
            <h2>Tous les vinyles</h2>
            <div id="fullCollection" class="grid" aria-live="polite"></div>
        </section>
    </div>
    
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
